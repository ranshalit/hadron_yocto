# BMI160 6-axis IMU over I2C
# DT node is already present in the CTI NGX012 full board DTB — only the driver needs enabling.
CONFIG_IIO=y
CONFIG_IIO_BUFFER=y
CONFIG_IIO_KFIFO_BUF=y
CONFIG_BMI160=m
CONFIG_BMI160_I2C=m

# Disable module versioning CRC — fixes R_AARCH64_ABS32 linker error with binutils >= 2.38.
# Safe in a Yocto image where all modules are built from the same kernel tree.
CONFIG_MODVERSIONS=n
